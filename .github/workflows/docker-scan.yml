name: "Docker Image Vulnerability Scan"
on:
  schedule:
    - cron: '0 2 * * 1' # 毎週月曜日02:00 UTC に実行
  workflow_dispatch: # 手動実行用

jobs:
  scan:
    name: Build and Scan with Trivy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # Securityタブに警告を書き込むための権限

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Build Docker Image
        run: cd ./nuxt && docker build -t my-app:latest .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'my-app:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM' # 検知したい深刻度
          ignore-unfixed: true
          skip-files: '**/node_modules/**'
          skip-dirs: 'node_modules'

      - name: Upload Trivy SARIF report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif-report
          path: trivy-results.sarif
          retention-days: 30

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4.36.2
        if: always() # スキャンでエラーが出ても必ずアップロードする
        with:
          sarif_file: 'trivy-results.sarif'
