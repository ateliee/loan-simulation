name: Deploy

on:
  workflow_run:
    branches: ["main"]
    workflows: ["test"]
    types:
      - completed

concurrency: ${{ github.workflow }}-${{ github.ref }}
permissions:
  contents: write
  # google-github-actions/auth（WIF）で OIDC トークンを取得するために必須
  id-token: write
jobs:
  tag:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.generate_tag.outputs.new_tag }}
      tag_exists: ${{ steps.check_existing_tag.outputs.exists }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0



      - name: Configure Git
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'github-actions@github.com'

      - name: Get latest tag
        id: get_latest_tag
        run: |
          git fetch --tags
          LATEST_TAG=$(git tag --list "v*" --sort=-v:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          echo "latest_tag=${LATEST_TAG}" >> $GITHUB_OUTPUT

      - name: Generate new tag
        id: generate_tag

        run: |
          LATEST_TAG=${{ steps.get_latest_tag.outputs.latest_tag }}
          VERSION=$(echo $LATEST_TAG | cut -d'v' -f2)
          MAJOR=$(echo $VERSION | cut -d'.' -f1)
          MINOR=$(echo $VERSION | cut -d'.' -f2)
          PATCH=$(echo $VERSION | cut -d'.' -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_TAG="v$MAJOR.$MINOR.$NEW_PATCH"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
      - name: Check if tag already exists
        id: check_existing_tag
        run: |
          if git rev-parse "${{ steps.generate_tag.outputs.new_tag }}" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      - name: Create and push tag
        if: ${{ steps.check_existing_tag.outputs.exists == 'false' }}
        run: |
          git tag ${{ steps.generate_tag.outputs.new_tag }}
          git push origin ${{ steps.generate_tag.outputs.new_tag }}

  deploy:
    needs: tag
    if: ${{ github.event.workflow_run.conclusion == 'success' && needs.tag.outputs.new_tag != '' && needs.tag.outputs.tag_exists == 'false' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: nuxt/package-lock.json
      - run: npm ci
        working-directory: ./nuxt
      - run: npm run generate
        working-directory: ./nuxt
      # GOOGLE_APPLICATION_CREDENTIALS は「ファイルパス」である必要がある（JSON 本文を直接入れない）
      - name: Write service account key for Firebase CLI
        env:
          GCP_SA_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
        run: |
          if [ -z "$GCP_SA_JSON" ]; then
            echo "::error::Secret GOOGLE_APPLICATION_CREDENTIALS が空です。Firebase 用サービスアカウント鍵の JSON 全文を登録してください。"
            exit 1
          fi
          printf '%s' "$GCP_SA_JSON" > "$RUNNER_TEMP/firebase-sa.json"
          chmod 600 "$RUNNER_TEMP/firebase-sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-sa.json" >> "$GITHUB_ENV"

      - name: Deploy to Firebase Hosting
        run: npm install -g firebase-tools@15.18.0 && firebase deploy --only hosting --non-interactive
      - name: Create GitHub Release (auto notes)
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ needs.tag.outputs.new_tag }}
          generate_release_notes: true
