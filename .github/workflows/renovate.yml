name: Renovate

permissions:
  contents: write
  pull-requests: write
  issues: write

on:
  schedule:
    - cron: "0 0 * * *"  # 毎日 0:00 UTC に実行（必要に応じて変更可）
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.17
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
