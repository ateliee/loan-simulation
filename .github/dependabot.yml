version: 2

updates:
  - package-ecosystem: npm
    directory: /nuxt
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    cooldown:
      default-days: 7
    groups:
      security-patches:
        applies-to: security-updates
        patterns:
          - "*"
        update-types:
          - patch
          - minor
      version-updates:
        applies-to: version-updates
        patterns:
          - "*"
    # ignore:
    #   - dependency-name: "*"
    #     update-types:
    #       - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    cooldown:
      default-days: 7
    groups:
      security-patches:
        applies-to: security-updates
        patterns:
          - "*"
        update-types:
          - patch
          - minor
      version-updates:
        applies-to: version-updates
        patterns:
          - "*"
    # ignore:
    #   - dependency-name: "*"
    #     update-types:
    #       - version-update:semver-major

  - package-ecosystem: docker
    directory: /nuxt
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    cooldown:
      default-days: 7
    groups:
      security-patches:
        applies-to: security-updates
        patterns:
          - "*"
        update-types:
          - patch
          - minor
      version-updates:
        applies-to: version-updates
        patterns:
          - "*"
    # ignore:
    #   - dependency-name: "*"
    #     update-types:
    #       - version-update:semver-major

  - package-ecosystem: docker
    directory: /infra/firebase
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    cooldown:
      default-days: 7
    groups:
      security-patches:
        applies-to: security-updates
        patterns:
          - "*"
        update-types:
          - patch
          - minor
      version-updates:
        applies-to: version-updates
        patterns:
          - "*"
    # ignore:
    #   - dependency-name: "*"
    #     update-types:
    #       - version-update:semver-major
